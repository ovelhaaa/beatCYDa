<svg width="1400" height="820" viewBox="0 0 1400 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1218"/>
      <stop offset="100%" stop-color="#080a0f"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#171c27"/>
      <stop offset="100%" stop-color="#101520"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1400" height="820" fill="url(#bg)"/>
  <text x="700" y="56" text-anchor="middle" fill="#c8d2e2" font-size="30" font-family="Inter,Segoe UI,sans-serif" letter-spacing="1.5">beatCYDa — UiEuclideanRings Mockup (Technical Constellation)</text>

  <!-- Perform Screen Frame -->
  <g transform="translate(110,120)" filter="url(#softShadow)">
    <rect x="0" y="0" rx="24" ry="24" width="500" height="620" fill="#0b0e14" stroke="#232c3d" stroke-width="3"/>
    <rect x="14" y="14" rx="16" ry="16" width="472" height="592" fill="url(#panel)"/>

    <rect x="28" y="32" width="444" height="34" rx="10" fill="#0e131c" stroke="#293348"/>
    <text x="44" y="55" fill="#a9b6cc" font-size="16" font-family="Inter,Segoe UI,sans-serif">PERFORM • 124 BPM • TRACK KICK</text>

    <!-- Hero rings -->
    <g transform="translate(170,255)">
      <circle r="112" fill="none" stroke="#8e9db8" stroke-opacity="0.35" stroke-width="1.6"/>
      <circle r="92" fill="none" stroke="#d28e7f" stroke-opacity="0.45" stroke-width="1.4"/>
      <circle r="74" fill="none" stroke="#6aa4d1" stroke-opacity="0.45" stroke-width="1.4"/>
      <circle r="56" fill="none" stroke="#adc47e" stroke-opacity="0.45" stroke-width="1.3"/>
      <circle r="38" fill="none" stroke="#b692d6" stroke-opacity="0.40" stroke-width="1.2"/>

      <!-- geometric shapes -->
      <polygon points="0,-112 79,-79 105,0 0,112 -86,70 -105,0" fill="none" stroke="#d8e4ff" stroke-opacity="0.45" stroke-width="1.2"/>
      <polygon points="0,-92 65,-65 86,0 20,90 -54,78 -86,0" fill="none" stroke="#d28e7f" stroke-opacity="0.75" stroke-width="1.4"/>
      <polygon points="0,-74 52,-52 74,0 10,73 -44,58 -74,0" fill="none" stroke="#6aa4d1" stroke-opacity="0.65" stroke-width="1.2"/>
      <polygon points="0,-56 39,-39 56,0 0,56 -39,39 -56,0" fill="none" stroke="#adc47e" stroke-opacity="0.55" stroke-width="1.1"/>
      <polygon points="0,-38 27,-27 38,0 0,38 -27,27 -38,0" fill="none" stroke="#8e72b6" stroke-opacity="0.45" stroke-width="1"/>

      <!-- hit nodes -->
      <g fill="#d8e4ff">
        <circle cx="0" cy="-112" r="3.1"/><circle cx="79" cy="-79" r="3.1"/><circle cx="105" cy="0" r="3.1"/><circle cx="0" cy="112" r="3.1"/><circle cx="-86" cy="70" r="3.1"/><circle cx="-105" cy="0" r="3.1"/>
      </g>
      <g fill="#d28e7f">
        <circle cx="0" cy="-92" r="2.7"/><circle cx="65" cy="-65" r="2.7"/><circle cx="86" cy="0" r="2.7"/><circle cx="20" cy="90" r="2.7"/><circle cx="-54" cy="78" r="2.7"/><circle cx="-86" cy="0" r="2.7"/>
      </g>

      <!-- playhead -->
      <line x1="0" y1="0" x2="100" y2="-42" stroke="#f1f5ff" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="2" fill="#f1f5ff"/>
    </g>

    <!-- Right controls -->
    <rect x="308" y="98" width="150" height="46" rx="12" fill="#255f8f"/>
    <text x="383" y="127" text-anchor="middle" fill="#eff7ff" font-size="18" font-family="Inter,Segoe UI,sans-serif">STOP</text>
    <rect x="308" y="154" width="150" height="46" rx="12" fill="#3d4457"/>
    <text x="383" y="183" text-anchor="middle" fill="#d8dfec" font-size="18" font-family="Inter,Segoe UI,sans-serif">MUTE</text>
    <rect x="308" y="212" width="150" height="70" rx="12" fill="#141a25" stroke="#2b3344"/>
    <text x="383" y="238" text-anchor="middle" fill="#8fa0bb" font-size="12" font-family="Inter,Segoe UI,sans-serif">STATUS</text>
    <text x="383" y="265" text-anchor="middle" fill="#f1f5ff" font-size="20" font-family="Inter,Segoe UI,sans-serif">KICK</text>

    <!-- Track chips -->
    <g transform="translate(30,530)" font-family="Inter,Segoe UI,sans-serif" font-size="14" text-anchor="middle">
      <rect x="0" y="0" width="76" height="36" rx="10" fill="#2a6ea5" stroke="#dbe6ff"/><text x="38" y="23" fill="#f2f7ff">T1</text>
      <rect x="88" y="0" width="76" height="36" rx="10" fill="#1c2230" stroke="#3a455d"/><text x="126" y="23" fill="#b5c2d8">T2</text>
      <rect x="176" y="0" width="76" height="36" rx="10" fill="#1c2230" stroke="#3a455d"/><text x="214" y="23" fill="#b5c2d8">T3</text>
      <rect x="264" y="0" width="76" height="36" rx="10" fill="#11151f" stroke="#2b3140"/><text x="302" y="23" fill="#76839a">T4</text>
      <rect x="352" y="0" width="76" height="36" rx="10" fill="#1c2230" stroke="#3a455d"/><text x="390" y="23" fill="#b5c2d8">T5</text>
    </g>
  </g>

  <!-- Pattern Screen Frame -->
  <g transform="translate(760,120)" filter="url(#softShadow)">
    <rect x="0" y="0" rx="24" ry="24" width="500" height="620" fill="#0b0e14" stroke="#232c3d" stroke-width="3"/>
    <rect x="14" y="14" rx="16" ry="16" width="472" height="592" fill="url(#panel)"/>

    <rect x="28" y="38" width="130" height="58" rx="12" fill="#171f2d" stroke="#2f3a50"/>
    <text x="92" y="63" text-anchor="middle" fill="#9fb0ca" font-size="12" font-family="Inter,Segoe UI,sans-serif">PATTERN</text>
    <text x="92" y="86" text-anchor="middle" fill="#eef5ff" font-size="18" font-family="Inter,Segoe UI,sans-serif">EDIT</text>

    <!-- Compact preview ring -->
    <g transform="translate(250,85)">
      <circle r="40" fill="none" stroke="#d28e7f" stroke-opacity="0.85" stroke-width="1.4"/>
      <circle r="32" fill="none" stroke="#6b768f" stroke-opacity="0.35" stroke-width="1"/>
      <polygon points="0,-40 29,-29 40,0 18,35 -21,34 -40,0" fill="none" stroke="#d28e7f" stroke-width="1.4"/>
      <circle cx="0" cy="-40" r="2.3" fill="#f6d0c7"/>
      <circle cx="29" cy="-29" r="2.3" fill="#f6d0c7"/>
      <circle cx="40" cy="0" r="2.3" fill="#f6d0c7"/>
      <circle cx="18" cy="35" r="2.3" fill="#f6d0c7"/>
      <circle cx="-21" cy="34" r="2.3" fill="#f6d0c7"/>
      <circle cx="-40" cy="0" r="2.3" fill="#f6d0c7"/>
      <line x1="0" y1="0" x2="31" y2="-14" stroke="#edf3ff" stroke-width="1.3"/>
      <text x="0" y="4" text-anchor="middle" fill="#d6deed" font-size="9" font-family="Inter,Segoe UI,sans-serif">SNRE</text>
      <text x="0" y="16" text-anchor="middle" fill="#d6deed" font-size="9" font-family="Inter,Segoe UI,sans-serif">6/16</text>
    </g>

    <!-- Chips -->
    <g transform="translate(28,116)" font-family="Inter,Segoe UI,sans-serif" font-size="13" text-anchor="middle">
      <rect x="0" y="0" width="76" height="28" rx="8" fill="#161c29" stroke="#33405a"/><text x="38" y="19" fill="#a3b3cb">T1</text>
      <rect x="88" y="0" width="76" height="28" rx="8" fill="#2a6ea5" stroke="#dbe6ff"/><text x="126" y="19" fill="#f2f7ff">T2</text>
      <rect x="176" y="0" width="76" height="28" rx="8" fill="#161c29" stroke="#33405a"/><text x="214" y="19" fill="#a3b3cb">T3</text>
      <rect x="264" y="0" width="76" height="28" rx="8" fill="#121722" stroke="#293245"/><text x="302" y="19" fill="#73829a">T4</text>
      <rect x="352" y="0" width="76" height="28" rx="8" fill="#161c29" stroke="#33405a"/><text x="390" y="19" fill="#a3b3cb">T5</text>
    </g>

    <!-- Macro rows -->
    <g transform="translate(28,170)" font-family="Inter,Segoe UI,sans-serif" fill="#c8d3e5">
      <rect x="0" y="0" width="444" height="34" rx="8" fill="#121826" stroke="#2d3850"/>
      <text x="14" y="22" font-size="14">STEPS</text><text x="300" y="22" font-size="14">16</text>
      <rect x="356" y="7" width="34" height="20" rx="6" fill="#2a3144"/><text x="372" y="22" text-anchor="middle">-</text>
      <rect x="398" y="7" width="34" height="20" rx="6" fill="#2a3144"/><text x="415" y="22" text-anchor="middle">+</text>

      <rect x="0" y="44" width="444" height="34" rx="8" fill="#121826" stroke="#2d3850"/>
      <text x="14" y="66" font-size="14">HITS</text><text x="300" y="66" font-size="14">6</text>
      <rect x="356" y="51" width="34" height="20" rx="6" fill="#2a3144"/><text x="372" y="66" text-anchor="middle">-</text>
      <rect x="398" y="51" width="34" height="20" rx="6" fill="#2a3144"/><text x="415" y="66" text-anchor="middle">+</text>

      <rect x="0" y="88" width="444" height="34" rx="8" fill="#121826" stroke="#2d3850"/>
      <text x="14" y="110" font-size="14">ROTATE</text><text x="300" y="110" font-size="14">3</text>
      <rect x="356" y="95" width="34" height="20" rx="6" fill="#2a3144"/><text x="372" y="110" text-anchor="middle">-</text>
      <rect x="398" y="95" width="34" height="20" rx="6" fill="#2a3144"/><text x="415" y="110" text-anchor="middle">+</text>

      <rect x="0" y="132" width="444" height="34" rx="8" fill="#121826" stroke="#2d3850"/>
      <text x="14" y="154" font-size="14">GAIN</text><text x="300" y="154" font-size="14">82%</text>
      <rect x="110" y="144" width="150" height="10" rx="5" fill="#1d2433"/>
      <rect x="110" y="144" width="123" height="10" rx="5" fill="#3b80b6"/>
      <rect x="356" y="139" width="34" height="20" rx="6" fill="#2a3144"/><text x="372" y="154" text-anchor="middle">-</text>
      <rect x="398" y="139" width="34" height="20" rx="6" fill="#2a3144"/><text x="415" y="154" text-anchor="middle">+</text>
    </g>

    <rect x="28" y="552" width="210" height="36" rx="10" fill="#2f3b53"/>
    <text x="133" y="576" text-anchor="middle" fill="#dce5f4" font-size="15" font-family="Inter,Segoe UI,sans-serif">RANDOM</text>
    <rect x="262" y="552" width="210" height="36" rx="10" fill="#6f2b36"/>
    <text x="367" y="576" text-anchor="middle" fill="#ffe6ea" font-size="15" font-family="Inter,Segoe UI,sans-serif">CLEAR</text>
  </g>
</svg>
