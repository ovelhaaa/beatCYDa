<svg width="520" height="520" viewBox="0 0 520 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0b1018; }
      .label { fill: #d3dbeb; font-family: 'Inter', Arial, sans-serif; font-size: 12px; }
      .sub { fill: #8ea2c6; font-family: 'Inter', Arial, sans-serif; font-size: 10px; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="520" height="520" rx="24"/>
  <text class="label" x="24" y="30">Mockup — Euclidean Rings (implementação atual)</text>
  <text class="sub" x="24" y="48">KICK 16/5 • SNARE 16/3 • CH 12/7 • OH 8/2 • BASS 16/6</text>

  <!-- Rings -->
  <circle cx="260" cy="270" r="200" fill="none" stroke="#4ba3ff" stroke-opacity="0.35" stroke-width="2"/>
  <circle cx="260" cy="270" r="165" fill="none" stroke="#ff6a7a" stroke-opacity="0.35" stroke-width="2"/>
  <circle cx="260" cy="270" r="130" fill="none" stroke="#ffcb57" stroke-opacity="0.35" stroke-width="2"/>
  <circle cx="260" cy="270" r="95" fill="none" stroke="#8b73ff" stroke-opacity="0.35" stroke-width="2"/>
  <circle cx="260" cy="270" r="60" fill="none" stroke="#6ce08f" stroke-opacity="0.35" stroke-width="2"/>

  <!-- Hit polygons (points remain connected) -->
  <polyline points="260,70 444,194 374,432 146,432 76,194 260,70" fill="none" stroke="#4ba3ff" stroke-opacity="0.75" stroke-width="2"/>
  <polyline points="260,105 403,352 117,352 260,105" fill="none" stroke="#ff6a7a" stroke-opacity="0.75" stroke-width="2"/>
