  <g fill="#6ce08f" fill-opacity="0.45"><circle cx="260" cy="210" r="3"/><circle cx="319" cy="292" r="3"/><circle cx="290" cy="332" r="3"/><circle cx="230" cy="332" r="3"/><circle cx="201" cy="292" r="3"/><circle cx="208" cy="231" r="3"/></g>
  <g fill="#6ce08f"><circle cx="260" cy="210" r="5"/><circle cx="319" cy="292" r="5"/><circle cx="290" cy="332" r="5"/><circle cx="230" cy="332" r="5"/><circle cx="201" cy="292" r="5"/><circle cx="208" cy="231" r="5"/></g>

  <!-- Current step highlight on each ring (step 3 sample) -->
  <circle cx="444" cy="194" r="8" fill="none" stroke="#ffffff" stroke-width="2"/>
  <circle cx="403" cy="352" r="8" fill="none" stroke="#ffffff" stroke-width="2"/>
  <circle cx="389" cy="228" r="8" fill="none" stroke="#ffffff" stroke-width="2"/>
  <circle cx="327" cy="365" r="8" fill="none" stroke="#ffffff" stroke-width="2"/>
  <circle cx="319" cy="292" r="8" fill="none" stroke="#ffffff" stroke-width="2"/>

  <!-- Orbiting transport marker (not rotating rings) -->
  <circle cx="456" cy="190" r="9" fill="none" stroke="#37d67a" stroke-opacity="0.65" stroke-width="3"/>
  <circle cx="456" cy="190" r="6" fill="#20e57a"/>
  <circle cx="456" cy="190" r="3" fill="#f7fffb"/>

  <text class="sub" x="24" y="500">Marcador de transporte orbita no anel externo; os anéis não giram.</text>
