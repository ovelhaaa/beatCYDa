  <g fill="#4ba3ff" fill-opacity="0.45">
    <circle cx="260" cy="70" r="3"/><circle cx="444" cy="194" r="3"/><circle cx="374" cy="432" r="3"/><circle cx="146" cy="432" r="3"/><circle cx="76" cy="194" r="3"/>
  </g>
  <g fill="#4ba3ff"><circle cx="260" cy="70" r="5"/><circle cx="444" cy="194" r="5"/><circle cx="374" cy="432" r="5"/><circle cx="146" cy="432" r="5"/><circle cx="76" cy="194" r="5"/></g>

  <g fill="#ff6a7a" fill-opacity="0.45"><circle cx="260" cy="105" r="3"/><circle cx="403" cy="352" r="3"/><circle cx="117" cy="352" r="3"/></g>
