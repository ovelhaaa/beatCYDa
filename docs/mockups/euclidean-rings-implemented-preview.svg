  <g fill="#ffcb57"><circle cx="260" cy="140" r="5"/><circle cx="389" cy="228" r="5"/><circle cx="373" cy="313" r="5"/><circle cx="324" cy="382" r="5"/><circle cx="196" cy="382" r="5"/><circle cx="146" cy="313" r="5"/><circle cx="131" cy="228" r="5"/></g>

