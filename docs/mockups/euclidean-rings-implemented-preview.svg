  <polyline points="260,175 327,365 193,365 260,175" fill="none" stroke="#8b73ff" stroke-opacity="0.75" stroke-width="2"/>
  <polyline points="260,210 312,231 319,292 290,332 230,332 201,292 208,231 260,210" fill="none" stroke="#6ce08f" stroke-opacity="0.75" stroke-width="2"/>

