    <rect x="72" y="196" width="56" height="32" rx="6" fill="#3c96dc" stroke="#b4e6ff"/>
    <text x="82" y="215">SNARE</text>

    <rect x="132" y="196" width="56" height="32" rx="6" fill="#24344a" stroke="#6a82a0"/>
    <text x="149" y="215">CH</text>

    <rect x="192" y="196" width="56" height="32" rx="6" fill="#24344a" stroke="#6a82a0"/>
    <text x="210" y="215">OH</text>

    <rect x="252" y="196" width="56" height="32" rx="6" fill="#24344a" stroke="#6a82a0"/>
    <text x="266" y="215">BASS</text>
  </g>

  <text x="10" y="238" fill="#7088a6" font-family="Arial" font-size="10">CYD 320x240 - Simulação da tela Perform implementada</text>
