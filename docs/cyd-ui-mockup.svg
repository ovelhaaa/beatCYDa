<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 860">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#131919" />
      <stop offset="100%" stop-color="#050707" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2b3233" />
      <stop offset="100%" stop-color="#151a1b" />
    </linearGradient>
    <linearGradient id="sliderFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff7a29" />
      <stop offset="100%" stop-color="#ffc24b" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <style>
      .title { font: 700 38px 'Segoe UI', sans-serif; fill: #f3f4f4; letter-spacing: 2px; }
      .label { font: 700 18px 'Segoe UI', sans-serif; fill: #f2f3f3; letter-spacing: 1px; }
      .small { font: 600 14px 'Segoe UI', sans-serif; fill: #a6b0b1; }
      .note { font: 600 20px 'Segoe UI', sans-serif; fill: #dae1e1; }
      .accent { fill: #ff8a35; }
      .outline { stroke: #4f5b5d; stroke-width: 3; }
      .dimline { stroke: #758384; stroke-width: 3; stroke-linecap: round; }
      .muted { fill: #98a3a4; }
    </style>
  </defs>

  <rect width="1280" height="860" fill="url(#bg)" />

  <text x="82" y="78" class="title">PENOSA CYD EDITION</text>
  <text x="82" y="112" class="small">mockup baseado na UI implementada em Display.cpp</text>

  <g transform="translate(70 150)" filter="url(#shadow)">
    <rect x="0" y="0" rx="38" ry="38" width="840" height="630" fill="#202628" stroke="#4b5759" stroke-width="6"/>
    <rect x="18" y="18" rx="28" ry="28" width="804" height="594" fill="#070909" stroke="#313a3b" stroke-width="4"/>

    <g transform="translate(36 30)">
      <rect x="0" y="0" rx="14" ry="14" width="165" height="58" fill="#10be56" stroke="#6adf93" stroke-width="3"/>
      <text x="82.5" y="37" text-anchor="middle" class="label" fill="#09110c">PLAY</text>

      <rect x="193" y="0" rx="14" ry="14" width="54" height="58" fill="#2a3132" class="outline"/>
      <text x="220" y="38" text-anchor="middle" class="label">-</text>

      <rect x="259" y="0" rx="14" ry="14" width="128" height="58" fill="#30393a" class="outline"/>
      <text x="323" y="38" text-anchor="middle" class="label">124</text>

      <rect x="399" y="0" rx="14" ry="14" width="54" height="58" fill="#2a3132" class="outline"/>
      <text x="426" y="38" text-anchor="middle" class="label">+</text>

      <rect x="472" y="0" rx="12" ry="12" width="34" height="58" fill="#2a3132" class="outline"/>
      <text x="489" y="38" text-anchor="middle" class="label">&lt;</text>

      <rect x="518" y="0" rx="12" ry="12" width="56" height="58" fill="#30393a" class="outline"/>
      <text x="546" y="38" text-anchor="middle" class="label">03</text>

      <rect x="586" y="0" rx="12" ry="12" width="34" height="58" fill="#2a3132" class="outline"/>
      <text x="603" y="38" text-anchor="middle" class="label">&gt;</text>

      <rect x="640" y="0" rx="10" ry="10" width="68" height="26" fill="#30393a" class="outline"/>
      <text x="674" y="19" text-anchor="middle" class="small">SV</text>

      <rect x="640" y="32" rx="10" ry="10" width="68" height="26" fill="#30393a" class="outline"/>
      <text x="674" y="51" text-anchor="middle" class="small">LD</text>
    </g>

    <g transform="translate(36 112)">
      <rect x="0" y="0" rx="24" ry="24" width="352" height="352" fill="url(#panel)" class="outline"/>
      <text x="176" y="34" text-anchor="middle" class="label">EUCLID</text>

      <circle cx="176" cy="180" r="118" fill="none" stroke="#3f494b" stroke-width="6"/>
      <circle cx="176" cy="180" r="98" fill="none" stroke="#3f494b" stroke-width="6"/>
      <circle cx="176" cy="180" r="78" fill="none" stroke="#3f494b" stroke-width="6"/>
      <circle cx="176" cy="180" r="58" fill="none" stroke="#3f494b" stroke-width="6"/>
      <circle cx="176" cy="180" r="38" fill="#222a2b" stroke="#4d595b" stroke-width="4"/>

      <g fill="#ff4d43">
        <circle cx="176" cy="62" r="8"/>
        <circle cx="246" cy="92" r="8"/>
        <circle cx="290" cy="180" r="8"/>
        <circle cx="106" cy="92" r="8"/>
      </g>
      <g fill="#ffe35f">
        <circle cx="176" cy="82" r="7"/>
        <circle cx="256" cy="138" r="7"/>
        <circle cx="256" cy="222" r="7"/>
      </g>
      <g fill="#58e0ff">
        <circle cx="176" cy="102" r="6"/>
        <circle cx="228" cy="124" r="6"/>
        <circle cx="254" cy="180" r="6"/>
        <circle cx="124" cy="124" r="6"/>
      </g>
      <g fill="#ff66e4">
        <circle cx="176" cy="122" r="5"/>
        <circle cx="224" cy="180" r="5"/>
        <circle cx="176" cy="238" r="5"/>
      </g>
      <g fill="#7ef388">
        <circle cx="176" cy="142" r="5"/>
        <circle cx="210" cy="160" r="5"/>
        <circle cx="214" cy="202" r="5"/>
        <circle cx="142" cy="160" r="5"/>
      </g>

      <circle cx="188" cy="168" r="8" fill="#ff8a35"/>
    </g>

    <g transform="translate(420 112)">
      <rect x="0" y="0" rx="16" ry="16" width="160" height="58" fill="#ff8a35" stroke="#ffc24b" stroke-width="3"/>
      <text x="80" y="37" text-anchor="middle" class="label" fill="#170b02">SEQ</text>

      <rect x="176" y="0" rx="16" ry="16" width="160" height="58" fill="#30393a" class="outline"/>
      <text x="256" y="37" text-anchor="middle" class="label">DSP</text>
    </g>

    <g transform="translate(412 186)">
      <rect x="0" y="0" rx="24" ry="24" width="380" height="290" fill="url(#panel)" class="outline"/>

      <text x="36" y="42" class="label">STEPS</text>
      <text x="336" y="42" text-anchor="end" class="label">16</text>
      <rect x="34" y="56" rx="12" ry="12" width="312" height="28" fill="#30393a"/>
      <rect x="34" y="56" rx="12" ry="12" width="192" height="28" fill="url(#sliderFill)"/>

      <text x="36" y="110" class="label">HITS</text>
      <text x="336" y="110" text-anchor="end" class="label">04</text>
      <rect x="34" y="124" rx="12" ry="12" width="312" height="28" fill="#30393a"/>
      <rect x="34" y="124" rx="12" ry="12" width="96" height="28" fill="#58e0ff"/>

      <text x="36" y="178" class="label">ROTATE</text>
      <text x="336" y="178" text-anchor="end" class="label">03</text>
      <rect x="34" y="192" rx="12" ry="12" width="312" height="28" fill="#30393a"/>
      <rect x="34" y="192" rx="12" ry="12" width="72" height="28" fill="#ff66e4"/>

      <text x="36" y="246" class="label">MUTE</text>
      <text x="336" y="246" text-anchor="end" class="label">OFF</text>
      <rect x="34" y="260" rx="12" ry="12" width="312" height="28" fill="#30393a"/>
      <rect x="34" y="260" rx="12" ry="12" width="22" height="28" fill="#7ef388"/>
    </g>

    <g transform="translate(418 500)">
      <rect x="0" y="0" rx="18" ry="18" width="374" height="62" fill="url(#panel)" class="outline"/>
      <text x="187" y="38" text-anchor="middle" class="label">Touch rings or steps</text>
    </g>

    <g transform="translate(36 500)">
      <rect x="0" y="0" rx="14" ry="14" width="56" height="58" fill="#ff4d43" stroke="#ff8a80" stroke-width="3"/>
      <text x="28" y="36" text-anchor="middle" class="label" fill="#120202">K</text>

      <rect x="68" y="0" rx="14" ry="14" width="56" height="58" fill="#273031" stroke="#ffe35f" stroke-width="3"/>
      <text x="96" y="36" text-anchor="middle" class="label" fill="#ffe35f">S</text>

      <rect x="136" y="0" rx="14" ry="14" width="56" height="58" fill="#273031" stroke="#58e0ff" stroke-width="3"/>
      <text x="164" y="36" text-anchor="middle" class="label" fill="#58e0ff">C</text>

      <rect x="204" y="0" rx="14" ry="14" width="56" height="58" fill="#273031" stroke="#ff66e4" stroke-width="3"/>
      <text x="232" y="36" text-anchor="middle" class="label" fill="#ff66e4">O</text>

      <rect x="272" y="0" rx="14" ry="14" width="56" height="58" fill="#273031" stroke="#7ef388" stroke-width="3"/>
      <text x="300" y="36" text-anchor="middle" class="label" fill="#7ef388">B</text>
    </g>
  </g>

  <g transform="translate(970 176)">
    <text x="0" y="0" class="note">Leitura visual do mockup</text>

    <circle cx="10" cy="58" r="6" fill="#10be56"/>
    <text x="28" y="64" class="small">Botao de transporte dominante no topo</text>

    <circle cx="10" cy="102" r="6" fill="#ff8a35"/>
    <text x="28" y="108" class="small">Tabs de modo: SEQ e DSP</text>

    <circle cx="10" cy="146" r="6" fill="#58e0ff"/>
    <text x="28" y="152" class="small">Sliders horizontais para toque por arrasto</text>

    <circle cx="10" cy="190" r="6" fill="#ff4d43"/>
    <text x="28" y="196" class="small">Anel euclidiano como centro performatico</text>

    <circle cx="10" cy="234" r="6" fill="#ffe35f"/>
    <text x="28" y="240" class="small">Selecao rapida de trilha na base</text>

    <circle cx="10" cy="278" r="6" fill="#7ef388"/>
    <text x="28" y="284" class="small">Status de feedback curto no rodape</text>

    <rect x="0" y="332" rx="22" ry="22" width="240" height="210" fill="#1a2021" stroke="#3d4748" stroke-width="3"/>
    <text x="24" y="366" class="label">Sugestoes para a proxima rodada</text>
    <text x="24" y="406" class="small">1. Botao MUTE dedicado por track</text>
    <text x="24" y="438" class="small">2. Tap direto nos aneis para selecionar voz</text>
    <text x="24" y="470" class="small">3. Mixer com volumes simultaneos</text>
    <text x="24" y="502" class="small">4. Pagina BASS com snap/harmonics</text>
  </g>
</svg>
